name: update comment
on: [pull_request]
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: update
        env:
          TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.number }}
        run: |
          FIRST_COMMENT_ID=$(curl -L -H "Accept: application/vnd.github+json" -H "X-GitHub-Api-Version: 2026-03-10" https://api.github.com/repos/$GITHUB_REPOSITORY/issues/$PR_NUMBER/comments?per_page=1 | grep '"id"' | head -1 | sed s/[^0-9]//g)
          curl -L -X PATCH -H "Accept: application/vnd.github+json" -H "Authorization: Bearer $TOKEN" -H "X-GitHub-Api-Version: 2026-03-10" https://api.github.com/repos/tdhock/atime/issues/comments/$FIRST_COMMENT_ID -d '{"body":"This is the first comment"}'
